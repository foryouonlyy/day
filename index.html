<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Surprise 🎂</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Layar pembuka -->
    <div id="startScreen">
        <button id="startBtn">Open Surprise 🎁</button>
    </div>

    <!-- Isi -->
    <div class="container">

        <h1>Happy Birthday 🎂</h1>

        <img src="foto.jpg" id="photo" alt="Foto Ulang Tahun">

        <p id="timer"></p>

        <button id="btnUcapan">💌 Baca Ucapan</button>
        <p id="ucapan"></p>

        <!-- Kue -->
        <div class="cake">

            <div class="top-layer"></div>

            <div class="cream1"></div>
            <div class="cream2"></div>

            <div class="cherry c1"></div>
            <div class="cherry c2"></div>
            <div class="cherry c3"></div>

            <div class="number-candle">
                <div class="num">
                    2
                    <div class="flame"></div>
                </div>

                <div class="num">
                    0
                    <div class="flame"></div>
                </div>
            </div>

        </div>

        <button id="blowBtn">🕯️ Tiup Lilin</button>

    </div>

    <!-- Musik -->
    <audio id="music" loop>
        <source src="lagu.mp3" type="audio/mp3">
    </audio>

    <!-- Script -->
    <script src="script.js"></script>

</body>
</html>
